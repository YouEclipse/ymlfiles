apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-page
  labels:
    app: profile-page
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-page
  template:
    metadata:
      labels:
        app: profile-page
    spec:
      containers:
        - name: profile-page
          image: profile-page:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: profile-page
spec:
  selector:
    app: profile-page
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
